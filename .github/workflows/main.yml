name: Trigger Fork Sync

on:
  push:
    branches: [main]

jobs:
  trigger:
    runs-on: ubuntu-latest

    steps:
      - name: Trigger fork repo
        run: |
          curl -X POST \
            -H "Authorization: token ${{ secrets.QM_FORK_SYNC_PAT }}" \
            -H "Accept: application/vnd.github.v3+json" \
            https://api.github.com/repos/didi1129/qmarket/dispatches \
            -d '{"event_type":"sync-fork"}'
